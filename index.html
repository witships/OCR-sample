<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>非AI 高精度テキストOCR (Tesseract.js)</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        background: #0f0f14;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 12px;
        gap: 14px;
      }

      header {
        width: 100%;
        max-width: 600px;
        text-align: center;
      }
      header h1 {
        font-size: 1rem;
        color: #8899aa;
        font-weight: 500;
        letter-spacing: 0.05em;
      }
      header .badge {
        display: inline-block;
        background: #1e3a4a;
        color: #4fc3f7;
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 20px;
        margin-top: 4px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ステータスバー */
      #status-bar {
        width: 100%;
        max-width: 600px;
        background: #1a1a22;
        border: 1px solid #2a2a38;
        border-radius: 8px;
        padding: 8px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.8rem;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ff5555;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .status-dot.ready   { background: #50fa7b; box-shadow: 0 0 6px #50fa7b88; }
      .status-dot.loading { background: #f1fa8c; animation: pulse 1s infinite; }
      .status-dot.busy    { background: #ffb86c; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      #status-text { color: #aaa; flex: 1; }

      /* カメラ表示 */
      .camera-wrapper {
        position: relative;
        width: 100%;
        max-width: 600px;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
        aspect-ratio: 16/9;
      }
      #video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      /* ガイド枠（SVGオーバーレイ） */
      .guide-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .guide-overlay rect {
        fill: none;
        stroke: #00d2d3;
        stroke-width: 2;
        stroke-dasharray: 8 4;
        opacity: 0.85;
      }
      .guide-label {
        position: absolute;
        top: calc(50% - 70px);
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.6rem;
        color: #00d2d3cc;
        white-space: nowrap;
        letter-spacing: 0.06em;
      }

      /* 結果表示 */
      .result-panel {
        width: 100%;
        max-width: 600px;
        background: #1a1a22;
        border: 1px solid #2a2a38;
        border-radius: 12px;
        padding: 14px 20px;
      }
      .result-label {
        font-size: 0.65rem;
        color: #556677;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      #text-result {
        font-size: 3rem;
        font-weight: 700;
        color: #50fa7b;
        letter-spacing: 0.08em;
        line-height: 1.1;
        min-height: 3.5rem;
        word-break: break-all;
        transition: color 0.2s;
      }
      #text-result.low  { color: #ff5555; }
      #text-result.mid  { color: #ffb86c; }
      #text-result.high { color: #50fa7b; }

      /* 信頼度 */
      .conf-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }
      .conf-label { font-size: 0.65rem; color: #556677; white-space: nowrap; }
      .conf-track {
        flex: 1;
        height: 4px;
        background: #2a2a38;
        border-radius: 2px;
        overflow: hidden;
      }
      #conf-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.2s, background 0.2s;
        width: 0%;
        background: #ff5555;
      }
      #conf-val {
        font-size: 0.65rem;
        color: #8899aa;
        width: 32px;
        text-align: right;
      }

      /* デバッグプレビュー */
      .debug-section {
        width: 100%;
        max-width: 600px;
      }
      .debug-title {
        font-size: 0.65rem;
        color: #445566;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .debug-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .debug-item {
        text-align: center;
        font-size: 0.62rem;
        color: #556677;
      }
      .debug-item canvas {
        border: 1px solid #2a2a38;
        border-radius: 6px;
        background: #000;
        display: block;
        margin-bottom: 3px;
      }

      /* コントロール */
      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        width: 100%;
        max-width: 600px;
      }
      .ctrl-group {
        background: #1a1a22;
        border: 1px solid #2a2a38;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.72rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .ctrl-group label { color: #7788aa; white-space: nowrap; }
      select, input[type=range] {
        background: #0f0f14;
        border: 1px solid #3a3a50;
        color: #ccc;
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 0.72rem;
      }
      input[type=range] { width: 80px; cursor: pointer; }

      /* 処理中スピナー */
      #spinner {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 28px;
        height: 28px;
        border: 3px solid #2a2a38;
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <header>
      <h1>非AI テキスト OCR</h1>
      <span class="badge">Tesseract.js — 従来型エンジン</span>
    </header>

    <!-- ステータス -->
    <div id="status-bar">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Tesseract.js を読み込み中...</span>
    </div>

    <!-- カメラ -->
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <svg class="guide-overlay" id="guide-svg">
        <!-- JS で動的にガイド枠を描画 -->
      </svg>
      <div class="guide-label" id="guide-label">◀ ここに数字を合わせてください ▶</div>
    </div>

    <!-- 認識結果 -->
    <div class="result-panel">
      <div class="result-label">認識結果</div>
      <div id="text-result">-</div>
      <div class="conf-row">
        <span class="conf-label">信頼度</span>
        <div class="conf-track"><div id="conf-fill"></div></div>
        <span id="conf-val">0%</span>
      </div>
    </div>

    <!-- コントロール -->
    <div class="controls">
      <div class="ctrl-group">
        <label>解析間隔</label>
        <input type="range" id="interval-slider" min="500" max="3000" step="500" value="1000" />
        <span id="interval-val">1.0s</span>
      </div>
      <div class="ctrl-group">
        <label>言語</label>
        <select id="lang-select">
          <option value="eng">英語 (数字・記号)</option>
          <option value="jpn">日本語</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>ページモード</label>
        <select id="psm-select">
          <option value="7" selected>1行テキスト (推奨)</option>
          <option value="6">ブロックテキスト</option>
          <option value="8">単語</option>
          <option value="13">生の行</option>
        </select>
      </div>
    </div>

    <!-- デバッグプレビュー -->
    <div class="debug-section">
      <div class="debug-title">デバッグプレビュー</div>
      <div class="debug-row">
        <div class="debug-item">
          <canvas id="canvas-crop" width="280" height="100"></canvas>
          切り出し
        </div>
        <div class="debug-item">
          <canvas id="canvas-gray" width="280" height="100"></canvas>
          前処理済み
        </div>
      </div>
    </div>

    <div id="spinner"></div>

    <!-- Tesseract.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
      // ==========================================
      // DOM 参照
      // ==========================================
      const video       = document.getElementById("video");
      const statusDot   = document.getElementById("status-dot");
      const statusText  = document.getElementById("status-text");
      const resultEl    = document.getElementById("text-result");
      const confFill    = document.getElementById("conf-fill");
      const confVal     = document.getElementById("conf-val");
      const spinner     = document.getElementById("spinner");
      const guideSvg    = document.getElementById("guide-svg");
      const canvasCrop  = document.getElementById("canvas-crop");
      const canvasGray  = document.getElementById("canvas-gray");
      const intervalSlider = document.getElementById("interval-slider");
      const intervalVal    = document.getElementById("interval-val");
      const langSelect     = document.getElementById("lang-select");
      const psmSelect      = document.getElementById("psm-select");

      // ROI サイズ（ガイド枠）
      const ROI_W = 320;
      const ROI_H = 100;

      // 処理用 Canvas（非表示）
      const procCanvas = document.createElement("canvas");
      procCanvas.width  = ROI_W;
      procCanvas.height = ROI_H;
      const procCtx = procCanvas.getContext("2d");

      // ==========================================
      // 設定
      // ==========================================
      let analyzeInterval = 1000;
      let isAnalyzing = false;
      let worker = null;
      let workerLang = "eng";

      intervalSlider.addEventListener("input", () => {
        analyzeInterval = parseInt(intervalSlider.value);
        intervalVal.innerText = (analyzeInterval / 1000).toFixed(1) + "s";
      });

      // 言語変更時はワーカー再生成
      langSelect.addEventListener("change", async () => {
        if (worker) {
          await worker.terminate();
          worker = null;
        }
        workerLang = langSelect.value;
        setStatus("loading", `言語切替中 (${workerLang})...`);
        await initWorker();
      });

      // ==========================================
      // ステータス更新
      // ==========================================
      function setStatus(state, msg) {
        statusDot.className = "status-dot " + state;
        statusText.innerText = msg;
      }

      // ==========================================
      // Tesseract ワーカー初期化
      // ==========================================
      async function initWorker() {
        setStatus("loading", "Tesseract ワーカーを初期化中...");
        worker = await Tesseract.createWorker(workerLang, 1, {
          logger: () => {} // 進捗ログ非表示
        });
        setStatus("ready", "Tesseract 準備完了");
        startCamera();
      }

      // ==========================================
      // カメラ起動
      // ==========================================
      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
          });
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            drawGuide();
            setStatus("ready", "カメラ起動完了 — 解析中...");
            scheduleAnalyze();
          };
        } catch (err) {
          setStatus("", "カメラ起動失敗: " + err.message);
        }
      }

      // ==========================================
      // SVG ガイド枠描画
      // ==========================================
      function drawGuide() {
        const vw = video.offsetWidth  || 600;
        const vh = video.offsetHeight || 337;
        // ガイド枠中央に配置
        const gx = (vw - ROI_W) / 2;
        const gy = (vh - ROI_H) / 2;
        guideSvg.innerHTML = `
          <rect x="${gx}" y="${gy}" width="${ROI_W}" height="${ROI_H}" rx="4"/>
        `;
        document.getElementById("guide-label").style.top = (gy - 18) + "px";
      }

      // ==========================================
      // 解析スケジューラ
      // ==========================================
      function scheduleAnalyze() {
        setTimeout(async () => {
          if (!isAnalyzing) {
            await analyzeFrame();
          }
          scheduleAnalyze();
        }, analyzeInterval);
      }

      // ==========================================
      // フレーム解析（前処理 + Tesseract）
      // ==========================================
      async function analyzeFrame() {
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

        isAnalyzing = true;
        spinner.style.display = "block";
        setStatus("busy", "解析中...");

        // 1. ROI 切り出し（元画像）
        const sx = (video.videoWidth  - ROI_W) / 2;
        const sy = (video.videoHeight - ROI_H) / 2;
        procCtx.drawImage(video, sx, sy, ROI_W, ROI_H, 0, 0, ROI_W, ROI_H);

        // デバッグ: 切り出し画像を表示
        canvasCrop.getContext("2d").drawImage(procCanvas, 0, 0);

        // 2. 前処理：3倍拡大 + 大津法二値化（Tesseractに最適な形式へ）
        const tessCanvas = preprocessForTesseract(procCanvas);

        // デバッグ: Tesseractに渡す実際の画像を表示（縮小して表示）
        const grayCtx = canvasGray.getContext("2d");
        grayCtx.fillStyle = "#000";
        grayCtx.fillRect(0, 0, canvasGray.width, canvasGray.height);
        // tessCanvas は 3x なのでキャンバスに縮小描画
        grayCtx.drawImage(tessCanvas, 0, 0, canvasGray.width, canvasGray.height);

        try {
          const psm = parseInt(psmSelect.value);
          const result = await worker.recognize(tessCanvas, {
            tessedit_pageseg_mode: psm,
            // ホワイトリストは外す（制限しすぎると度記号など認識できなくなる）
          });

          const text = result.data.text.trim().replace(/\s+/g, " ");
          const conf = result.data.confidence; // 0〜100

          // 結果表示
          resultEl.innerText = text.length > 0 ? text : "（認識不可）";
          updateConf(conf);

        } catch (err) {
          console.error("Tesseract エラー:", err);
          resultEl.innerText = "エラー";
        }

        setStatus("ready", "待機中 — 次の解析まで " + (analyzeInterval / 1000).toFixed(1) + "s");
        spinner.style.display = "none";
        isAnalyzing = false;
      }

      // ==========================================
      // 前処理：Tesseract用最適化
      //   1. 3倍拡大（DPI相当を上げる）
      //   2. グレースケール化
      //   3. 大津法（Otsu）で自動二値化
      //   4. 背景自動判定（白背景・黒文字に統一）
      //   5. 白枠パディング（端の文字を保護）
      // ==========================================
      function preprocessForTesseract(srcCanvas) {
        const w = srcCanvas.width;
        const h = srcCanvas.height;
        const SCALE = 3;   // 3倍拡大（Tesseractの認識精度に直結）
        const PAD   = 20;  // 白枠パディング（px）

        // ── Step 1: 3倍拡大 ──
        const sw = w * SCALE;
        const sh = h * SCALE;
        const sc = document.createElement("canvas");
        sc.width  = sw;
        sc.height = sh;
        const sCtx = sc.getContext("2d");
        sCtx.imageSmoothingEnabled  = true;
        sCtx.imageSmoothingQuality  = "high";
        sCtx.drawImage(srcCanvas, 0, 0, sw, sh);

        // ── Step 2: グレースケール化 ──
        const imgData = sCtx.getImageData(0, 0, sw, sh);
        const data = imgData.data;
        const gray = new Uint8Array(sw * sh);
        for (let i = 0; i < gray.length; i++) {
          gray[i] = Math.round(
            0.299 * data[i * 4] +
            0.587 * data[i * 4 + 1] +
            0.114 * data[i * 4 + 2]
          );
        }

        // ── Step 3: 大津法で最適閾値を自動計算 ──
        const thr = otsuThreshold(gray);

        // ── Step 4: 背景色判定（白背景・黒文字に統一）──
        // 閾値以下のピクセル（暗い）が50%超 → 背景が暗い → 反転して黒文字化
        let darkCount = 0;
        for (const v of gray) { if (v < thr) darkCount++; }
        const invert = darkCount > gray.length * 0.5;

        const binary = new Uint8ClampedArray(sw * sh * 4);
        for (let i = 0; i < gray.length; i++) {
          let isText = gray[i] < thr;   // 暗いピクセル = 文字
          if (invert) isText = !isText; // 背景が暗い場合は反転
          const val = isText ? 0 : 255; // 文字=黒(0), 背景=白(255)
          binary[i * 4]     = val;
          binary[i * 4 + 1] = val;
          binary[i * 4 + 2] = val;
          binary[i * 4 + 3] = 255;
        }

        // ── Step 5: 白枠パディングを追加 ──
        const fw = sw + PAD * 2;
        const fh = sh + PAD * 2;
        const fc = document.createElement("canvas");
        fc.width  = fw;
        fc.height = fh;
        const fCtx = fc.getContext("2d");
        fCtx.fillStyle = "white";
        fCtx.fillRect(0, 0, fw, fh);
        fCtx.putImageData(new ImageData(binary, sw, sh), PAD, PAD);

        return fc; // ← このCanvasをTesseractに渡す
      }

      // ==========================================
      // 大津法（Otsu's Method）：最適閾値を自動計算
      // ==========================================
      function otsuThreshold(gray) {
        const hist = new Array(256).fill(0);
        for (const v of gray) hist[v]++;
        const total = gray.length;

        let sum = 0;
        for (let i = 0; i < 256; i++) sum += i * hist[i];

        let sumB = 0, wB = 0, maxVar = 0, threshold = 128;
        for (let i = 0; i < 256; i++) {
          wB += hist[i];
          if (!wB) continue;
          const wF = total - wB;
          if (!wF) break;
          sumB += i * hist[i];
          const mB = sumB / wB;
          const mF = (sum - sumB) / wF;
          const between = wB * wF * (mB - mF) ** 2;
          if (between > maxVar) { maxVar = between; threshold = i; }
        }
        return threshold;
      }

      // ==========================================
      // 信頼度表示更新
      // ==========================================
      function updateConf(conf) {
        confFill.style.width = conf + "%";
        confVal.innerText    = Math.round(conf) + "%";
        if (conf >= 70) {
          confFill.style.background = "#50fa7b";
          resultEl.className = "high";
        } else if (conf >= 40) {
          confFill.style.background = "#ffb86c";
          resultEl.className = "mid";
        } else {
          confFill.style.background = "#ff5555";
          resultEl.className = "low";
        }
      }

      // ==========================================
      // 起動
      // ==========================================
      initWorker();
    </script>
  </body>
</html>
