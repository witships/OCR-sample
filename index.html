<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>非AI 高精度テキストOCR (Tesseract.js)</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* =============================================
         スマホ1画面レイアウト
         100dvh = ブラウザUIを除いた実際の画面高さ
      ============================================= */
      html, body {
        height: 100%;
        overflow: hidden; /* スクロール完全禁止 */
      }
      body {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        background: #0f0f14;
        color: #e0e0e0;
        height: 100dvh; /* Dynamic Viewport Height（アドレスバー考慮） */
        display: flex;
        flex-direction: column;
        align-items: stretch;
        overflow: hidden;
      }

      /* ── ヘッダー（固定・極小） ── */
      #app-header {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        background: #13131a;
        border-bottom: 1px solid #1e1e2e;
        gap: 8px;
      }
      #app-header h1 {
        font-size: 0.78rem;
        color: #7788aa;
        font-weight: 500;
        white-space: nowrap;
      }
      .badge {
        background: #1e3a4a;
        color: #4fc3f7;
        font-size: 0.6rem;
        padding: 2px 7px;
        border-radius: 20px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      /* ステータス（ヘッダー右端） */
      #status-bar {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.68rem;
        color: #7788aa;
        overflow: hidden;
      }
      .status-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #ff5555;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .status-dot.ready   { background: #50fa7b; box-shadow: 0 0 5px #50fa7b88; }
      .status-dot.loading { background: #f1fa8c; animation: pulse 1s infinite; }
      .status-dot.busy    { background: #ffb86c; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
      #status-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }

      /* ── カメラ（残り高さを全て使う） ── */
      .camera-wrapper {
        flex: 1 1 0;
        position: relative;
        overflow: hidden;
        background: #000;
        min-height: 0; /* flex縮小を許可 */
      }
      #video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .guide-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .guide-overlay rect {
        fill: none;
        stroke: #00d2d3;
        stroke-width: 2;
        stroke-dasharray: 8 4;
        opacity: 0.85;
      }
      .guide-label {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.58rem;
        color: #00d2d3cc;
        white-space: nowrap;
        letter-spacing: 0.05em;
        background: rgba(0,0,0,0.35);
        padding: 1px 6px;
        border-radius: 3px;
      }

      /* ── 結果パネル（固定高さ） ── */
      .result-panel {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 14px;
        background: #13131a;
        border-top: 1px solid #1e1e2e;
      }
      .result-left { flex: 1; min-width: 0; }
      .result-label {
        font-size: 0.6rem;
        color: #445566;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 1px;
      }
      #text-result {
        font-size: 2.2rem;
        font-weight: 700;
        color: #50fa7b;
        letter-spacing: 0.06em;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.2s;
      }
      #text-result.low  { color: #ff5555; }
      #text-result.mid  { color: #ffb86c; }
      #text-result.high { color: #50fa7b; }

      /* 信頼度（右側縦配置） */
      .result-right {
        flex: 0 0 52px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }
      #conf-circle {
        width: 44px; height: 44px;
        border-radius: 50%;
        border: 3px solid #2a2a38;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        font-weight: 700;
        color: #8899aa;
        background: #0f0f14;
        transition: border-color 0.2s, color 0.2s;
      }
      #conf-circle.low  { border-color: #ff5555; color: #ff5555; }
      #conf-circle.mid  { border-color: #ffb86c; color: #ffb86c; }
      #conf-circle.high { border-color: #50fa7b; color: #50fa7b; }
      .conf-label-sm { font-size: 0.55rem; color: #445566; }

      /* ── コントロールバー（最下部固定） ── */
      .ctrl-bar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #0a0a10;
        border-top: 1px solid #1a1a28;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .ctrl-bar::-webkit-scrollbar { display: none; }
      .ctrl-item {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
        font-size: 0.68rem;
        color: #6677aa;
        white-space: nowrap;
      }
      .ctrl-item label { color: #556688; }
      select, input[type=range] {
        background: #13131a;
        border: 1px solid #2a2a3a;
        color: #bbc;
        border-radius: 5px;
        padding: 3px 6px;
        font-size: 0.68rem;
      }
      input[type=range] { width: 70px; cursor: pointer; }
      .ctrl-divider {
        width: 1px; height: 18px;
        background: #2a2a3a;
        flex-shrink: 0;
      }

      /* ── デバッグ（折りたたみ式） ── */
      details.debug-drawer {
        flex: 0 0 auto;
        background: #0a0a10;
        border-top: 1px solid #1a1a28;
      }
      details.debug-drawer summary {
        font-size: 0.62rem;
        color: #445566;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 5px 12px;
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }
      details.debug-drawer summary::before {
        content: '▶';
        font-size: 0.5rem;
        transition: transform 0.2s;
      }
      details.debug-drawer[open] summary::before { transform: rotate(90deg); }
      .debug-row {
        display: flex;
        gap: 8px;
        padding: 0 10px 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .debug-row::-webkit-scrollbar { display: none; }
      .debug-item {
        text-align: center;
        font-size: 0.58rem;
        color: #445566;
        flex-shrink: 0;
      }
      .debug-item canvas {
        border: 1px solid #1e1e2e;
        border-radius: 4px;
        background: #000;
        display: block;
        margin-bottom: 2px;
      }

      /* 処理中スピナー */
      #spinner {
        display: none;
        position: fixed;
        bottom: 70px;
        right: 14px;
        width: 22px; height: 22px;
        border: 3px solid #1e1e2e;
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        z-index: 100;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

  </head>
    <!-- ヘッダー -->
    <div id="app-header">
      <h1>非AI OCR <span class="badge">Tesseract.js</span></h1>
      <div id="status-bar">
        <div class="status-dot loading" id="status-dot"></div>
        <span id="status-text">読み込み中...</span>
      </div>
    </div>

    <!-- カメラ（画面の大部分を占める） -->
    <div class="camera-wrapper">
      <video id="video" autoplay playsinline muted></video>
      <svg class="guide-overlay" id="guide-svg"></svg>
      <div class="guide-label" id="guide-label">◀ ここに数字を合わせてください ▶</div>
    </div>

    <!-- 認識結果パネル -->
    <div class="result-panel">
      <div class="result-left">
        <div class="result-label">認識結果</div>
        <div id="text-result">-</div>
      </div>
      <div class="result-right">
        <div id="conf-circle">0%</div>
        <span class="conf-label-sm">信頼度</span>
      </div>
    </div>

    <!-- デバッグ（折りたたみ式 → 初期非表示） -->
    <details class="debug-drawer">
      <summary>デバッグプレビュー</summary>
      <div class="debug-row">
        <div class="debug-item">
          <canvas id="canvas-crop" width="200" height="72"></canvas>
          切り出し
        </div>
        <div class="debug-item">
          <canvas id="canvas-gray" width="200" height="72"></canvas>
          前処理済み
        </div>
      </div>
    </details>

    <!-- コントロールバー（最下部固定） -->
    <div class="ctrl-bar">
      <div class="ctrl-item">
        <label>間隔</label>
        <input type="range" id="interval-slider" min="500" max="3000" step="500" value="1000" />
        <span id="interval-val">1.0s</span>
      </div>
      <div class="ctrl-divider"></div>
      <div class="ctrl-item">
        <label>言語</label>
        <select id="lang-select">
          <option value="eng">英語</option>
          <option value="jpn">日本語</option>
        </select>
      </div>
      <div class="ctrl-divider"></div>
      <div class="ctrl-item">
        <label>モード</label>
        <select id="psm-select">
          <option value="7" selected>1行</option>
          <option value="6">ブロック</option>
          <option value="8">単語</option>
          <option value="13">生の行</option>
        </select>
      </div>
    </div>

    <div id="spinner"></div>

    <!-- Tesseract.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
      // ==========================================
      // DOM 参照
      // ==========================================
      const video       = document.getElementById("video");
      const statusDot   = document.getElementById("status-dot");
      const statusText  = document.getElementById("status-text");
      const resultEl    = document.getElementById("text-result");
      const confCircle  = document.getElementById("conf-circle");
      const spinner     = document.getElementById("spinner");
      const guideSvg    = document.getElementById("guide-svg");
      const canvasCrop  = document.getElementById("canvas-crop");
      const canvasGray  = document.getElementById("canvas-gray");
      const intervalSlider = document.getElementById("interval-slider");
      const intervalVal    = document.getElementById("interval-val");
      const langSelect     = document.getElementById("lang-select");
      const psmSelect      = document.getElementById("psm-select");

      // ROI サイズ（ガイド枠）
      const ROI_W = 320;
      const ROI_H = 100;

      // 処理用 Canvas（非表示）
      const procCanvas = document.createElement("canvas");
      procCanvas.width  = ROI_W;
      procCanvas.height = ROI_H;
      const procCtx = procCanvas.getContext("2d");

      // ==========================================
      // 設定
      // ==========================================
      let analyzeInterval = 1000;
      let isAnalyzing = false;
      let worker = null;
      let workerLang = "eng";

      intervalSlider.addEventListener("input", () => {
        analyzeInterval = parseInt(intervalSlider.value);
        intervalVal.innerText = (analyzeInterval / 1000).toFixed(1) + "s";
      });

      // 言語変更時はワーカー再生成
      langSelect.addEventListener("change", async () => {
        if (worker) {
          await worker.terminate();
          worker = null;
        }
        workerLang = langSelect.value;
        setStatus("loading", `言語切替中 (${workerLang})...`);
        await initWorker();
      });

      // ==========================================
      // ステータス更新
      // ==========================================
      function setStatus(state, msg) {
        statusDot.className = "status-dot " + state;
        statusText.innerText = msg;
      }

      // ==========================================
      // Tesseract ワーカー初期化
      // ==========================================
      async function initWorker() {
        setStatus("loading", "Tesseract ワーカーを初期化中...");
        worker = await Tesseract.createWorker(workerLang, 1, {
          logger: () => {} // 進捗ログ非表示
        });
        setStatus("ready", "Tesseract 準備完了");
        startCamera();
      }

      // ==========================================
      // カメラ起動
      // ==========================================
      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
          });
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            drawGuide();
            setStatus("ready", "カメラ起動完了 — 解析中...");
            scheduleAnalyze();
          };
        } catch (err) {
          setStatus("", "カメラ起動失敗: " + err.message);
        }
      }

      // ==========================================
      // SVG ガイド枠描画
      // ==========================================
      function drawGuide() {
        const vw = video.offsetWidth  || 600;
        const vh = video.offsetHeight || 337;
        // ガイド枠中央に配置
        const gx = (vw - ROI_W) / 2;
        const gy = (vh - ROI_H) / 2;
        guideSvg.innerHTML = `
          <rect x="${gx}" y="${gy}" width="${ROI_W}" height="${ROI_H}" rx="4"/>
        `;
        document.getElementById("guide-label").style.top = (gy - 18) + "px";
      }

      // ==========================================
      // 解析スケジューラ
      // ==========================================
      function scheduleAnalyze() {
        setTimeout(async () => {
          if (!isAnalyzing) {
            await analyzeFrame();
          }
          scheduleAnalyze();
        }, analyzeInterval);
      }

      // ==========================================
      // フレーム解析（前処理 + Tesseract）
      // ==========================================
      async function analyzeFrame() {
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

        isAnalyzing = true;
        spinner.style.display = "block";
        setStatus("busy", "解析中...");

        // 1. ROI 切り出し（元画像）
        const sx = (video.videoWidth  - ROI_W) / 2;
        const sy = (video.videoHeight - ROI_H) / 2;
        procCtx.drawImage(video, sx, sy, ROI_W, ROI_H, 0, 0, ROI_W, ROI_H);

        // デバッグ: 切り出し画像を表示
        canvasCrop.getContext("2d").drawImage(procCanvas, 0, 0);

        // 2. 前処理：3倍拡大 + 大津法二値化（Tesseractに最適な形式へ）
        const tessCanvas = preprocessForTesseract(procCanvas);

        // デバッグ: Tesseractに渡す実際の画像を表示（縮小して表示）
        const grayCtx = canvasGray.getContext("2d");
        grayCtx.fillStyle = "#000";
        grayCtx.fillRect(0, 0, canvasGray.width, canvasGray.height);
        // tessCanvas は 3x なのでキャンバスに縮小描画
        grayCtx.drawImage(tessCanvas, 0, 0, canvasGray.width, canvasGray.height);

        try {
          const psm = parseInt(psmSelect.value);
          const result = await worker.recognize(tessCanvas, {
            tessedit_pageseg_mode: psm,
            // ホワイトリストは外す（制限しすぎると度記号など認識できなくなる）
          });

          const text = result.data.text.trim().replace(/\s+/g, " ");
          const conf = result.data.confidence; // 0〜100

          // 結果表示
          resultEl.innerText = text.length > 0 ? text : "（認識不可）";
          updateConf(conf);

        } catch (err) {
          console.error("Tesseract エラー:", err);
          resultEl.innerText = "エラー";
        }

        setStatus("ready", "待機中 — 次の解析まで " + (analyzeInterval / 1000).toFixed(1) + "s");
        spinner.style.display = "none";
        isAnalyzing = false;
      }

      // ==========================================
      // 前処理：Tesseract用最適化
      //   1. 3倍拡大（DPI相当を上げる）
      //   2. グレースケール化
      //   3. 大津法（Otsu）で自動二値化
      //   4. 背景自動判定（白背景・黒文字に統一）
      //   5. 白枠パディング（端の文字を保護）
      // ==========================================
      function preprocessForTesseract(srcCanvas) {
        const w = srcCanvas.width;
        const h = srcCanvas.height;
        const SCALE = 3;   // 3倍拡大（Tesseractの認識精度に直結）
        const PAD   = 20;  // 白枠パディング（px）

        // ── Step 1: 3倍拡大 ──
        const sw = w * SCALE;
        const sh = h * SCALE;
        const sc = document.createElement("canvas");
        sc.width  = sw;
        sc.height = sh;
        const sCtx = sc.getContext("2d");
        sCtx.imageSmoothingEnabled  = true;
        sCtx.imageSmoothingQuality  = "high";
        sCtx.drawImage(srcCanvas, 0, 0, sw, sh);

        // ── Step 2: グレースケール化 ──
        const imgData = sCtx.getImageData(0, 0, sw, sh);
        const data = imgData.data;
        const gray = new Uint8Array(sw * sh);
        for (let i = 0; i < gray.length; i++) {
          gray[i] = Math.round(
            0.299 * data[i * 4] +
            0.587 * data[i * 4 + 1] +
            0.114 * data[i * 4 + 2]
          );
        }

        // ── Step 3: 大津法で最適閾値を自動計算 ──
        const thr = otsuThreshold(gray);

        // ── Step 4: 背景色判定（白背景・黒文字に統一）──
        // 閾値以下のピクセル（暗い）が50%超 → 背景が暗い → 反転して黒文字化
        let darkCount = 0;
        for (const v of gray) { if (v < thr) darkCount++; }
        const invert = darkCount > gray.length * 0.5;

        const binary = new Uint8ClampedArray(sw * sh * 4);
        for (let i = 0; i < gray.length; i++) {
          let isText = gray[i] < thr;   // 暗いピクセル = 文字
          if (invert) isText = !isText; // 背景が暗い場合は反転
          const val = isText ? 0 : 255; // 文字=黒(0), 背景=白(255)
          binary[i * 4]     = val;
          binary[i * 4 + 1] = val;
          binary[i * 4 + 2] = val;
          binary[i * 4 + 3] = 255;
        }

        // ── Step 5: 白枠パディングを追加 ──
        const fw = sw + PAD * 2;
        const fh = sh + PAD * 2;
        const fc = document.createElement("canvas");
        fc.width  = fw;
        fc.height = fh;
        const fCtx = fc.getContext("2d");
        fCtx.fillStyle = "white";
        fCtx.fillRect(0, 0, fw, fh);
        fCtx.putImageData(new ImageData(binary, sw, sh), PAD, PAD);

        return fc; // ← このCanvasをTesseractに渡す
      }

      // ==========================================
      // 大津法（Otsu's Method）：最適閾値を自動計算
      // ==========================================
      function otsuThreshold(gray) {
        const hist = new Array(256).fill(0);
        for (const v of gray) hist[v]++;
        const total = gray.length;

        let sum = 0;
        for (let i = 0; i < 256; i++) sum += i * hist[i];

        let sumB = 0, wB = 0, maxVar = 0, threshold = 128;
        for (let i = 0; i < 256; i++) {
          wB += hist[i];
          if (!wB) continue;
          const wF = total - wB;
          if (!wF) break;
          sumB += i * hist[i];
          const mB = sumB / wB;
          const mF = (sum - sumB) / wF;
          const between = wB * wF * (mB - mF) ** 2;
          if (between > maxVar) { maxVar = between; threshold = i; }
        }
        return threshold;
      }

      // ==========================================
      // 信頼度表示更新
      // ==========================================
      function updateConf(conf) {
        confCircle.innerText = Math.round(conf) + "%";
        confCircle.className = conf >= 70 ? "high" : conf >= 40 ? "mid" : "low";
        resultEl.className   = conf >= 70 ? "high" : conf >= 40 ? "mid" : "low";
      }

      // ==========================================
      // 起動
      // ==========================================
      initWorker();
    </script>
  </body>
</html>
